<svg xmlns="http://www.w3.org/2000/svg" width="820" height="180" viewBox="0 0 820 180" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="sa" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0 0 L8 4 L0 8 z" fill="#a371f7"/>
    </marker>
  </defs>

  <!-- start -->
  <rect x="16" y="60" width="168" height="60" rx="30" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="38" y="93" font-size="16">🎙️</text>
  <text x="58" y="93" font-size="16">📞</text>
  <text x="82" y="86" font-size="12.5" font-weight="650" fill="#e6edf3">Click to start</text>
  <text x="82" y="102" font-size="11" fill="#8b949e">same button either way</text>

  <path d="M184 90 h34" stroke="#a371f7" stroke-width="1.8" fill="none" marker-end="url(#sa)"/>

  <!-- recording state -->
  <rect x="226" y="68" width="150" height="44" rx="22" fill="#2d2148"/>
  <circle cx="248" cy="90" r="5" fill="#ff7eb6"/>
  <text x="262" y="94" font-size="12.5" font-weight="650" fill="#c8b1fa">Recording…</text>

  <path d="M376 90 h34" stroke="#a371f7" stroke-width="1.8" fill="none" marker-end="url(#sa)"/>

  <!-- stop -->
  <rect x="418" y="60" width="168" height="60" rx="30" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="440" y="93" font-size="16">🎙️</text>
  <text x="460" y="93" font-size="16">📞</text>
  <text x="484" y="86" font-size="12.5" font-weight="650" fill="#e6edf3">Click to stop</text>
  <text x="484" y="102" font-size="11" fill="#8b949e">same button</text>

  <path d="M586 90 h34" stroke="#a371f7" stroke-width="1.8" fill="none" marker-end="url(#sa)"/>

  <!-- result -->
  <rect x="628" y="34" width="176" height="112" rx="16" fill="#1c1526" stroke="#a371f7" stroke-width="1.5"/>
  <text x="650" y="64" font-size="13" font-weight="700" fill="#e6edf3">Tagged note</text>
  <text x="650" y="86" font-size="11" fill="#8b949e">Summarized, linked,</text>
  <text x="650" y="101" font-size="11" fill="#8b949e">audio kept inside</text>
  <text x="650" y="126" font-size="13">📥</text>
  <text x="670" y="126" font-size="11" fill="#a371f7">In your inbox</text>
</svg>
